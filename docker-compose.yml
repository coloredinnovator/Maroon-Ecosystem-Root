# =============================================================================
# Maroon Ecosystem — Docker Compose Orchestration (v4.0)
# Brings up all 18 sovereign services in a single command.
# =============================================================================
version: "3.9"

services:
  # ---------- THE BRAIN (Control Plane) ----------

  council-core:
    build: ./maroon-council-core
    container_name: maroon-council-core
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  truth-teller-core:
    build: ./maroon-truth-teller-core
    container_name: maroon-truth-teller-core
    ports:
      - "8001:8001"
    restart: unless-stopped

  compliance-core:
    build: ./maroon-compliance-core
    container_name: maroon-compliance-core
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  palantir-lake:
    build: ./maroon-palantir-lake
    container_name: maroon-palantir-lake
    ports:
      - "8010:8010"
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - DATABASE_URL=postgresql://maroon:maroon@postgres:5432/palantir_lake
    depends_on:
      - kafka
      - postgres
    restart: unless-stopped

  # ---------- THE BODY (Business Ecosystem) ----------

  safe-space:
    build: ./safe-space-core
    container_name: safe-space-core
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    restart: unless-stopped

  tube-core:
    build: ./maroon-tube-core
    container_name: maroon-tube-core
    ports:
      - "8080:8080"
    volumes:
      - tube-uploads:/app/uploads
      - tube-hls:/app/hls
    restart: unless-stopped

  market-core:
    build: ./maroon-market-core
    container_name: maroon-market-core
    ports:
      - "9000:9000"
    depends_on:
      - postgres
    restart: unless-stopped

  onitas-market:
    build: ./onitas-market-core
    container_name: onitas-market-core
    ports:
      - "3000:3000"
    depends_on:
      - market-core
    restart: unless-stopped

  market-logistics:
    build: ./maroon-market-logistics
    container_name: maroon-market-logistics
    ports:
      - "8004:8004"
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  # ---------- MEDICAL ----------

  medical-opco:
    build: ./maroon-medical-opco
    container_name: maroon-medical-opco
    ports:
      - "8005:8005"
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  medical-diagnostics:
    build: ./maroon-medical-diagnostics
    container_name: maroon-medical-diagnostics
    ports:
      - "8006:8006"
    depends_on:
      - postgres
    restart: unless-stopped

  medical-rehab:
    build: ./maroon-medical-rehab
    container_name: maroon-medical-rehab
    ports:
      - "8007:8007"
    depends_on:
      - postgres
    restart: unless-stopped

  # ---------- CIVIC & LEGAL ----------

  pac-core:
    build: ./maroon-pac-core
    container_name: maroon-pac-core
    ports:
      - "8008:8008"
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  law-finance:
    build: ./maroon-law-finance-core
    container_name: maroon-law-finance-core
    ports:
      - "8009:8009"
    depends_on:
      - postgres
    restart: unless-stopped

  real-estate:
    build: ./maroon-real-estate-core
    container_name: maroon-real-estate-core
    ports:
      - "8003:8003"
    depends_on:
      - postgres
    restart: unless-stopped

  # ---------- INFRASTRUCTURE ----------

  postgres:
    image: pgvector/pgvector:pg16
    container_name: maroon-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=maroon
      - POSTGRES_PASSWORD=maroon
      - POSTGRES_DB=palantir_lake
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: maroon-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: "MaroonEcosystem4_0_KafkaCluster"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

volumes:
  pg-data:
  kafka-data:
  tube-uploads:
  tube-hls:
